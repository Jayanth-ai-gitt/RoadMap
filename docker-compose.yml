version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: careerpath_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: careerpath_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: careerpath_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@careerpath.ai
      PGADMIN_DEFAULT_PASSWORD: adminpassword
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
